# Omnia simulation tunables. Edit values here to change behavior without touching logic.
# All randomness derives from `seed`, so a given seed replays identically.

world:
  gridWidth: 64
  gridHeight: 64
  initialPopulation: 50      # Milestone 0 may start lower (~20); raise as systems mature.
  seed: 1                    # change for a different town; same seed => same run.
  biomeSeedCount: 14         # number of Voronoi biome seeds at world generation (M2).
  # World population at generation (per passable tile, gated by biome spawn tables):
  floraDensity: 0.06         # chance a passable tile starts with flora
  faunaDensity: 0.006        # chance a passable tile starts with fauna
  resourceDensity: 0.01      # chance a passable tile starts with a resource node
  maxFlora: 500              # hard cap on flora entities (spread is bounded)
  maxFauna: 150              # hard cap on fauna entities (breeding is bounded)
  faunaBreedChancePerDay: 0.5 # per-day chance a fed, off-cooldown fauna breeds

time:
  ticksPerDay: 240           # simulation granularity within a day.
  daysPerSeason: 30
  simSpeedTicksPerSecond: 6  # initial real-time playback speed; decoupled from sim time. Adjust live with the in-app speed slider (pause/FF freely).

# Need decay per in-sim day (0..1 scale; higher = depletes faster). Action utility rises as a need drops.
needs:
  hungerDecayPerDay: 0.8
  energyDecayPerDay: 0.7
  hygieneDecayPerDay: 0.3
  socialDecayPerDay: 0.4
  funDecayPerDay: 0.3
  actionThreshold: 0.4       # below this, satisfying the need dominates action choice.

# Life cycle (see docs/ROADMAP.md M4). Agents age, socialise, marry, fall ill, and die.
life_cycle:
  daysPerYear: 4             # sim-days per "year" (compressed so lives turn over in a session)
  adultAgeYears: 16          # age at which an agent works / courts / reproduces
  initialAgeMinYears: 16     # founders are seeded with a spread of ages...
  initialAgeMaxYears: 55     #   ...so the town starts with a real generation mix
  socialDecayPerDay: 0.4     # social-need depletion
  marrySentiment: 0.7        # warmth two adults need before they may wed
  marryChancePerDay: 0.2     # daily chance an eligible, willing pair weds
  illnessChancePerDay: 0.03  # chance per day of falling ill
  baseMortalityPerDay: 0.0003 # flat background death chance
  ageMortalityScale: 0.5     # age-driven mortality multiplier (ramps steeply near lifespan)

# Economy (see docs/ROADMAP.md M3). Agents earn wages, pay a daily cost of living,
# and work toward a personal wealth goal (which bounds accumulation).
economy:
  businessCount: 8           # employer entities placed at world generation.
  dailyUpkeep: 3             # cost of living deducted from each agent per day.
  wealthGoalMin: 30          # agents roll a personal gold target in [min, max];
  wealthGoalMax: 110         #   they work while below it, so wealth stays bounded.
  businessStartBalance: 300  # employer starting funds.
  businessRevenueMargin: 0.25 # revenue per working employee = wage × (1 + margin).

performance:
  maxActiveAgents: 500       # design target for smooth simulation on a typical laptop.
  tickBudgetMs: 4            # soft budget for non-LLM systems per tick; profile if exceeded.
  offscreenTickInterval: 4   # off-screen/indoor agents may update every N ticks (light optimization only).

# History compression (see docs/SIMULATION_MODEL.md). Balances "rich" against "cheap".
history:
  workingMemorySize: 40      # K: raw recent events kept per agent before rollup.
  rolloverEveryDays: 7       # how often older memories are summarized and pruned.
  chronicleImportanceThreshold: 0.7   # events at/above this become town "legends".
  beliefRetention: lifetime  # reflections (beliefs) persist for the agent's life.
  ancientChronicleCompressAfterYears: 50  # old chronicle entries collapse to one-liners.

# Authored content (see docs/CONTENT_AND_DATA.md). Paths are relative to repo root.
content:
  root: "./content"          # loader discovers and validates every file under here at startup.
  failOnInvalid: true        # a malformed content file aborts startup with a clear error.

# Unified capability system (see docs/MAGIC_AND_TECHNOLOGY.md).
capabilities:
  baseMagicAptitudeChance: 0.03   # reference base rate; per-species magicAptitudeChance in content is authoritative.
  magicManaMax: 100               # mana pool size for aptitude-gifted agents (M3 part 2).
  manaRegenPerDay: 10             # mana regenerated per in-sim day, for agents with aptitude.
  allowLostArts: true             # an art with no living practitioner becomes "lost" until rediscovered (backlog).

# Culture & language evolution (see docs/CULTURE_AND_LANGUAGE.md). Tuned for "deep but tenable".
culture_language:
  evolveEveryYears: 5        # evolution runs on this generational schedule, never per tick.
  soundChangeRate: 0.15      # probability weighting for phoneme shifts per evolution step.
  lexicalDriftRate: 0.1      # rate of word coinage/loss/meaning shift per step.
  valueDriftRate: 0.08       # cultural value movement per step.
  maxTrackedLanguages: 24    # soft cap; beyond this, merge/retire the least-used (tenability guard).
  maxTrackedCultures: 24
  llmFlavor: true            # let the LLM occasionally gloss a word or name a value (recorded to event log).

llm:
  provider: ollama
  baseUrl: http://localhost:11434
  model: llama3.1:8b         # swap freely (e.g. qwen, gemma); access is behind AIProvider.
  maxConcurrentCalls: 2      # keep low so the local model never becomes a bottleneck.
  perAgentCooldownDays: 1    # minimum sim-days between "soul" calls for one agent.
  recordResponses: true      # log LLM outputs into the event log for deterministic replay.
