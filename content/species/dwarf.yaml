# Stocky, subterranean, hardy. Eats slowly (low hunger multiplier), rarely magical.
id: "dwarf"
name: "Dwarf"
lifespanYears: { min: 180, max: 260 }
size: "small"
spawnWeight: 2
color: "#9fb8c8"        # cold slate blue
tags: ["sapient", "subterranean"]
needs:
  hunger: 0.7           # dwarves get hungry more slowly than humans
  energy: 1.1           # but tire a little faster
magicAptitudeChance: 0.01   # rarer than humans (reserved for M3)
language: "drakhan"         # dwarves are named from the hard, clustered tongue (M7)
abilityMods: { con: 2, str: 1, dex: -1, cha: -1 }   # stocky, hardy, gruff (M13)
